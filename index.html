<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025音樂劇劇目與製作團隊網絡圖</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎵</text></svg>">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --sidebar-bg: #1e293b; --text-main: #ffffff;
            --text-dim: #94a3b8; --accent-work: #38bdf8; --accent-person: #4ade80;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100%; width: 100%; }
        
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            #sidebar { width: 100% !important; height: 45% !important; border-right: none !important; }
            #mynetwork { height: 55% !important; }
        }

        #sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid #334155; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; }
        #mynetwork { flex-grow: 1; height: 100%; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }

        .sidebar-header { padding: 15px 20px; background: #161e2d; border-bottom: 1px solid #334155; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-item { background: var(--bg-color); padding: 8px 5px; border-radius: 6px; text-align: center; border: 1px solid #334155; }
        .stat-value { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent-work); }

        .main-tabs { display: flex; background: #0f172a; cursor: pointer; border-bottom: 1px solid #334155; }
        .main-tab { flex: 1; padding: 15px; text-align: center; color: var(--text-dim); font-size: 0.9rem; transition: 0.3s; }
        .main-tab.active { color: var(--text-main); background: var(--sidebar-bg); font-weight: bold; }

        .sub-tabs { display: flex; padding: 10px 20px 0 20px; gap: 10px; }
        .sub-btn { padding: 5px 12px; font-size: 0.75rem; border-radius: 20px; border: 1px solid #475569; background: transparent; color: var(--text-dim); cursor: pointer; }
        .sub-btn.active { background: var(--accent-work); color: var(--bg-color); border-color: var(--accent-work); }

        .toolbar { padding: 15px 20px; border-bottom: 1px solid #334155; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .tool-btn { flex: 1; padding: 8px; background: #334155; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        .filter-section { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .search-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; margin-bottom: 10px; outline: none; }

        .zoom-controls { position: absolute; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 500; opacity: 0; transition: opacity 0.5s; }
        .zoom-controls.ready { opacity: 1; pointer-events: auto; }
        .zoom-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(56, 189, 248, 0.8); color: white; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .check-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .count-tag { font-size: 0.7rem; color: var(--text-dim); background: #0f172a; padding: 2px 6px; border-radius: 10px; }
        
        #loading-overlay { position: absolute; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        
        /* Tooltip 樣式自定義 */
        div.vis-tooltip { background: #1e293b !important; color: white !important; border: 1px solid #38bdf8 !important; border-radius: 5px !important; padding: 10px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important; font-weight: bold !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">數據與模式初始化中...</div>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2 style="margin:0; font-size:0.9rem; color: var(--accent-work);">數據概覽面板</h2>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-value" id="stat-works">0</span><span style="font-size:0.6rem;">劇目</span></div>
                    <div class="stat-item"><span class="stat-value" id="stat-people">0</span><span style="font-size:0.6rem;">人物</span></div>
                    <div class="stat-item"><span class="stat-value" id="stat-edges">0</span><span style="font-size:0.6rem;">連線</span></div>
                </div>
            </div>

            <div class="main-tabs">
                <div id="tab-bi" class="main-tab active" onclick="setMainMode('bipartite')">原始二部圖</div>
                <div id="tab-one" class="main-tab" onclick="setMainMode('one-mode')">One-Mode 投影</div>
            </div>

            <div class="sub-tabs" id="subTabsGroup">
                <button id="sub-work" class="sub-btn active" onclick="setSubTab('work')">劇目清單</button>
                <button id="sub-person" class="sub-btn" onclick="setSubTab('person')">人物清單</button>
            </div>

            <div class="toolbar">
                <div class="btn-group">
                    <button class="tool-btn" onclick="selectAll(true)">全部顯示</button>
                    <button class="tool-btn" onclick="selectAll(false)">全部隱藏</button>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋名稱...">
            </div>
            
            <div id="filterList" class="filter-section"></div>
        </div>

        <div id="mynetwork">
            <div id="zoomGroup" class="zoom-controls">
                <button class="zoom-btn" onclick="zoom(1.2)">+</button>
                <button class="zoom-btn" onclick="zoom(0.8)">−</button>
                <button class="zoom-btn" onclick="resetZoom()" style="font-size:0.75rem;">RESET</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let network = null;
        let nodeDataSet = new vis.DataSet();
        let edgeDataSet = new vis.DataSet();
        let currentMainMode = 'bipartite'; 
        let currentSubTab = 'work';
        let selectedWorks = new Set();
        let selectedPeople = new Set();
        let nodeCounts = {};

        function init() {
            graphData.nodes.forEach(n => {
                nodeCounts[n.id] = graphData.links.filter(l => l.source === n.id || l.target === n.id).length;
                if(n.type === 'work') selectedWorks.add(n.id); else selectedPeople.add(n.id);
            });
            
            updateStatsUI();
            buildBipartite();

            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes: nodeDataSet, edges: edgeDataSet }, {
                physics: { solver: 'forceAtlas2Based', stabilization: { iterations: 100 } },
                interaction: { hover: true, tooltipDelay: 100 }
            });

            network.on("click", function (params) {
                if (currentMainMode !== 'bipartite') return;
                if (params.nodes.length > 0) {
                    const focusId = params.nodes[0];
                    const neighbors = network.getConnectedNodes(focusId);
                    nodeDataSet.update(nodeDataSet.getIds().map(id => ({
                        id: id, hidden: !(id === focusId || neighbors.includes(id))
                    })));
                } else { updateVisibility(); }
            });

            network.once("stabilizationIterationsDone", function () {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('zoomGroup').classList.add('ready');
                }, 500);
                network.setOptions({ physics: { enabled: false } });
            });

            renderList();
        }

        function setMainMode(mode) {
            currentMainMode = mode;
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(mode === 'bipartite' ? 'tab-bi' : 'tab-one').classList.add('active');
            
            const subGroup = document.getElementById('subTabsGroup');
            if (mode === 'one-mode') {
                subGroup.style.visibility = 'hidden';
                currentSubTab = 'person';
            } else {
                subGroup.style.visibility = 'visible';
                currentSubTab = 'work';
                document.getElementById('sub-work').classList.add('active');
                document.getElementById('sub-person').classList.remove('active');
            }

            network.setOptions({ physics: { enabled: true } });
            if (mode === 'bipartite') { buildBipartite(); } 
            else { buildOneMode(); }
            
            updateVisibility();
            renderList();
        }

        function setSubTab(type) {
            currentSubTab = type;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`sub-${type}`).classList.add('active');
            renderList();
            updateVisibility();
        }

        function buildBipartite() {
            nodeDataSet.clear(); edgeDataSet.clear();
            nodeDataSet.add(graphData.nodes.map(n => ({
                id: n.id, 
                label: n.id, 
                title: `${n.id} (相關數: ${nodeCounts[n.id]})`, // 游標懸停顯示名稱與相關數
                shape: n.type === 'work' ? 'diamond' : 'dot',
                size: Math.sqrt(nodeCounts[n.id]) * 6 + 12,
                color: { background: n.type === 'work' ? '#38bdf8' : '#4ade80', border: '#ffffff' },
                font: { color: '#ffffff' }
            })));
            edgeDataSet.add(graphData.links.map(l => ({
                from: l.source, to: l.target, label: l.role,
                font: { size: 10, color: '#94a3b8' }, color: { color: '#334155' }, arrows: 'to'
            })));
        }

        function buildOneMode() {
            nodeDataSet.clear(); edgeDataSet.clear();
            const people = graphData.nodes.filter(n => n.type === 'person');
            nodeDataSet.add(people.map(p => ({
                id: p.id, 
                label: p.id, 
                title: `${p.id} (相關數: ${nodeCounts[p.id]})`, // 游標懸停顯示
                shape: 'dot', 
                size: 15, 
                color: '#4ade80', 
                font: { color: '#fff' }
            })));
            const links = [];
            graphData.nodes.filter(n => n.type === 'work').forEach(w => {
                const staff = graphData.links.filter(l => l.source === w.id).map(l => l.target);
                for (let i = 0; i < staff.length; i++) {
                    for (let j = i + 1; j < staff.length; j++) {
                        links.push({ from: staff[i], to: staff[j], color: { color: 'rgba(56,189,248,0.2)' } });
                    }
                }
            });
            edgeDataSet.add(links);
        }

        function renderList() {
            const container = document.getElementById('filterList'); container.innerHTML = '';
            const term = document.getElementById('searchInput').value.toLowerCase();
            let list = graphData.nodes.filter(n => n.type === currentSubTab && n.id.toLowerCase().includes(term));
            list.sort((a, b) => nodeCounts[b.id] - nodeCounts[a.id]);

            list.forEach(node => {
                const isChecked = currentSubTab === 'work' ? selectedWorks.has(node.id) : selectedPeople.has(node.id);
                const item = document.createElement('div');
                item.className = 'check-item';
                item.innerHTML = `
                    <label style="display:flex; align-items:center; flex:1; cursor:pointer;">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="margin-right:10px;">
                        <span style="color:${isChecked ? 'white' : 'var(--text-dim)'}">${node.id}</span>
                    </label>
                    <span class="count-tag">${nodeCounts[node.id]}</span>
                `;
                item.querySelector('input').addEventListener('change', (e) => {
                    if (currentSubTab === 'work') e.target.checked ? selectedWorks.add(node.id) : selectedWorks.delete(node.id);
                    else e.target.checked ? selectedPeople.add(node.id) : selectedPeople.delete(node.id);
                    updateVisibility(); renderList();
                });
                container.appendChild(item);
            });
        }

        // 核心更新：在 One-Mode 下也要能控制隱藏
        function updateVisibility() {
            if (currentMainMode === 'bipartite') {
                network.setOptions({ physics: { enabled: true, stabilization: { iterations: 20 } } });
                nodeDataSet.update(graphData.nodes.map(node => {
                    let isV = false;
                    if (currentSubTab === 'work') {
                        isV = node.type === 'work' ? selectedWorks.has(node.id) : graphData.links.filter(l => l.target === node.id).some(l => selectedWorks.has(l.source));
                    } else {
                        isV = node.type === 'person' ? selectedPeople.has(node.id) : graphData.links.filter(l => l.source === node.id).some(l => selectedPeople.has(l.target));
                    }
                    return { id: node.id, hidden: !isV };
                }));
            } else {
                // One-Mode 投影模式下的隱藏邏輯：直接對應人物清單
                const personNodes = graphData.nodes.filter(n => n.type === 'person');
                nodeDataSet.update(personNodes.map(p => ({
                    id: p.id,
                    hidden: !selectedPeople.has(p.id)
                })));
            }
        }

        function selectAll(bool) {
            const term = document.getElementById('searchInput').value.toLowerCase();
            graphData.nodes.filter(n => n.type === currentSubTab && n.id.toLowerCase().includes(term)).forEach(n => {
                if (currentSubTab === 'work') bool ? selectedWorks.add(n.id) : selectedWorks.delete(n.id);
                else bool ? selectedPeople.add(n.id) : selectedPeople.delete(n.id);
            });
            renderList(); updateVisibility();
        }

        function zoom(s) { network.moveTo({ scale: network.getScale() * s }); }
        function resetZoom() { network.fit({ animation: true }); }
        function updateStatsUI() {
            document.getElementById('stat-works').innerText = graphData.nodes.filter(n => n.type === 'work').length;
            document.getElementById('stat-people').innerText = graphData.nodes.filter(n => n.type === 'person').length;
            document.getElementById('stat-edges').innerText = graphData.links.length;
        }

        document.getElementById('searchInput').addEventListener('input', renderList);
        window.onload = init;
    </script>
</body>
</html>
