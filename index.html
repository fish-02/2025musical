<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025 音樂劇高級數據分析系統</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --sidebar-bg: #1e293b; --text-main: #ffffff;
            --text-dim: #94a3b8; --accent-work: #38bdf8; --accent-person: #4ade80;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100%; width: 100%; }
        
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            #sidebar { width: 100% !important; height: 45% !important; border-right: none !important; border-bottom: 1px solid #334155; }
            #mynetwork { height: 55% !important; }
        }

        #sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid #334155; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; }
        #mynetwork { flex-grow: 1; height: 100%; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }

        .sidebar-header { padding: 15px 20px; background: #161e2d; border-bottom: 1px solid #334155; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-item { background: var(--bg-color); padding: 8px 5px; border-radius: 6px; text-align: center; border: 1px solid #334155; }
        .stat-value { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent-work); }

        .analysis-box { padding: 15px 20px; background: #0f172a; border-bottom: 1px solid #334155; }
        .mode-btn-group { display: flex; gap: 5px; margin-top: 5px; }
        .mode-btn { flex: 1; padding: 6px; font-size: 0.7rem; background: #334155; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background: var(--accent-work); color: var(--bg-color); font-weight: bold; }

        .tabs { display: flex; background: #0f172a; cursor: pointer; }
        .tab { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 0.85rem; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent-work); background: #1e293b; }

        .toolbar { padding: 10px 20px; background: var(--sidebar-bg); border-bottom: 1px solid #334155; }
        .filter-section { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .search-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; margin-bottom: 10px; outline: none; }

        .zoom-controls { position: absolute; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 500; opacity: 0; transition: opacity 0.5s; }
        .zoom-controls.ready { opacity: 1; pointer-events: auto; }
        .zoom-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(56, 189, 248, 0.8); color: white; border: none; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .check-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .count-tag { font-size: 0.7rem; color: var(--text-dim); background: #0f172a; padding: 2px 6px; border-radius: 10px; }
        #loading-overlay { position: absolute; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <div id="loading-overlay">分析數據權重中...</div>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2 style="margin:0; font-size:1rem; color: var(--accent-work);">網絡數據概覽</h2>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-value" id="stat-works">0</span><span style="font-size:0.6rem; color:var(--text-dim);">劇目</span></div>
                    <div class="stat-item"><span class="stat-value" id="stat-people">0</span><span style="font-size:0.6rem; color:var(--text-dim);">人物</span></div>
                    <div class="stat-item"><span class="stat-value" id="stat-edges">0</span><span style="font-size:0.6rem; color:var(--text-dim);">連線</span></div>
                </div>
            </div>

            <div class="analysis-box">
                <span style="font-size:0.75rem; color:var(--text-dim);">切換網絡模式：</span>
                <div class="mode-btn-group">
                    <button id="btn-bi" class="mode-btn active" onclick="changeNetworkMode('bipartite')">原始二部圖</button>
                    <button id="btn-one" class="mode-btn" onclick="changeNetworkMode('one-mode')">One-Mode 投影</button>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-work" onclick="switchTab('work')">劇目清單</div>
                <div class="tab" id="tab-person" onclick="switchTab('person')">人物清單</div>
            </div>

            <div class="toolbar">
                <select id="sortOrder" style="width:100%; padding:8px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid #475569; border-radius:4px;" onchange="renderList()">
                    <option value="countDesc">依關聯數量 (多 → 少)</option>
                    <option value="name">依名稱排序 (A-Z)</option>
                </select>
                <input type="text" id="searchInput" class="search-input" placeholder="快速搜尋...">
            </div>
            
            <div id="filterList" class="filter-section"></div>
        </div>

        <div id="mynetwork">
            <div id="zoomGroup" class="zoom-controls">
                <button class="zoom-btn" onclick="zoom(1.2)">+</button>
                <button class="zoom-btn" onclick="zoom(0.8)">−</button>
                <button class="zoom-btn" onclick="resetZoom()" style="font-size:0.75rem;">RESET</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let network = null;
        let nodeDataSet = new vis.DataSet();
        let edgeDataSet = new vis.DataSet();
        let currentTab = 'work';
        let currentMode = 'bipartite'; 
        let selectedWorks = new Set();
        let selectedPeople = new Set();
        let nodeCounts = {};

        function init() {
            // 1. 預計算 Degree (相關數量)
            graphData.nodes.forEach(n => {
                const count = graphData.links.filter(l => l.source === n.id || l.target === n.id).length;
                nodeCounts[n.id] = count;
                if(n.type === 'work') selectedWorks.add(n.id); else selectedPeople.add(n.id);
            });
            
            updateStats();
            buildBipartite();

            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes: nodeDataSet, edges: edgeDataSet }, {
                physics: { 
                    solver: 'forceAtlas2Based', 
                    forceAtlas2Based: { gravitationalConstant: -100, springLength: 150 },
                    stabilization: { iterations: 150 }
                },
                interaction: { hover: true, tooltipDelay: 150 }
            });

            // 2. 點擊節點後：濾掉非鄰居、拉近鄰居
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const focusId = params.nodes[0];
                    const connectedNodes = network.getConnectedNodes(focusId);
                    
                    const updates = nodeDataSet.getIds().map(id => ({
                        id: id,
                        hidden: !(id === focusId || connectedNodes.includes(id))
                    }));
                    nodeDataSet.update(updates);
                    // 暫時開啟物理引擎拉近鄰居
                    network.setOptions({ physics: { enabled: true, forceAtlas2Based: { springLength: 50 } } });
                } else {
                    updateVisibility(); // 點擊空白恢復
                }
            });

            network.once("stabilizationIterationsDone", function () {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('zoomGroup').classList.add('ready');
                }, 500);
                network.setOptions({ physics: { enabled: false } });
            });

            renderList();
        }

        // 構建原始二部圖 (包含 Degree 縮放大小)
        function buildBipartite() {
            nodeDataSet.clear(); edgeDataSet.clear();
            nodeDataSet.add(graphData.nodes.map(n => ({
                id: n.id, label: n.id, title: `${n.id} (相關: ${nodeCounts[n.id]})`,
                shape: n.type === 'work' ? 'diamond' : 'dot',
                // 重要：依 Degree 調整大小，公式：根號(count) * 倍率 + 基本值
                size: Math.sqrt(nodeCounts[n.id]) * 6 + 12, 
                color: { background: n.type === 'work' ? '#38bdf8' : '#4ade80', border: '#ffffff' },
                font: { color: '#ffffff', size: 14 }
            })));
            edgeDataSet.add(graphData.links.map(l => ({
                from: l.source, to: l.target, label: l.role,
                font: { size: 10, color: '#94a3b8' }, color: { color: '#334155' }, arrows: 'to'
            })));
        }

        // 轉換為 One-Mode Network (以人物合作關係投影)
        function changeNetworkMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(mode === 'bipartite' ? 'btn-bi' : 'btn-one').classList.add('active');
            
            if (mode === 'bipartite') {
                buildBipartite();
                updateVisibility();
            } else {
                nodeDataSet.clear(); edgeDataSet.clear();
                // 僅顯示人物
                const people = graphData.nodes.filter(n => n.type === 'person');
                nodeDataSet.add(people.map(p => ({
                    id: p.id, label: p.id, shape: 'dot', size: 15, color: '#4ade80', font: { color: '#fff' }
                })));
                // 找出合作關係
                const links = [];
                const works = graphData.nodes.filter(n => n.type === 'work');
                works.forEach(w => {
                    const staff = graphData.links.filter(l => l.source === w.id).map(l => l.target);
                    for (let i = 0; i < staff.length; i++) {
                        for (let j = i + 1; j < staff.length; j++) {
                            links.push({ from: staff[i], to: staff[j], color: { color: 'rgba(56,189,248,0.2)' } });
                        }
                    }
                });
                edgeDataSet.add(links);
            }
            network.setOptions({ physics: { enabled: true } });
        }

        function zoom(s) { network.moveTo({ scale: network.getScale() * s }); }
        function resetZoom() { network.fit({ animation: true }); }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            renderList();
        }

        function updateStats() {
            document.getElementById('stat-works').innerText = graphData.nodes.filter(n => n.type === 'work').length;
            document.getElementById('stat-people').innerText = graphData.nodes.filter(n => n.type === 'person').length;
            document.getElementById('stat-edges').innerText = graphData.links.length;
        }

        function renderList() {
            const container = document.getElementById('filterList'); container.innerHTML = '';
            const term = document.getElementById('searchInput').value.toLowerCase();
            const sortVal = document.getElementById('sortOrder').value;
            
            let list = graphData.nodes.filter(n => n.type === currentTab && n.id.toLowerCase().includes(term));
            list.sort((a, b) => sortVal === 'countDesc' ? nodeCounts[b.id] - nodeCounts[a.id] : a.id.localeCompare(b.id, 'zh-Hant'));

            list.forEach(node => {
                const isChecked = currentTab === 'work' ? selectedWorks.has(node.id) : selectedPeople.has(node.id);
                const item = document.createElement('div');
                item.className = 'check-item';
                item.innerHTML = `
                    <label style="display:flex; align-items:center; flex:1; cursor:pointer;">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="margin-right:10px;">
                        <span style="color:${isChecked ? 'white' : 'var(--text-dim)'}">${node.id}</span>
                    </label>
                    <span class="count-tag">${nodeCounts[node.id]}</span>
                `;
                item.querySelector('input').addEventListener('change', (e) => {
                    if (currentTab === 'work') e.target.checked ? selectedWorks.add(node.id) : selectedWorks.delete(node.id);
                    else e.target.checked ? selectedPeople.add(node.id) : selectedPeople.delete(node.id);
                    updateVisibility();
                    renderList();
                });
                container.appendChild(item);
            });
        }

        function updateVisibility() {
            if (currentMode !== 'bipartite') return;
            network.setOptions({ physics: { enabled: true, stabilization: { iterations: 20 } } });
            const updates = graphData.nodes.map(node => {
                let isVisible = false;
                if (currentTab === 'work') {
                    if (node.type === 'work') isVisible = selectedWorks.has(node.id);
                    else isVisible = graphData.links.filter(l => l.target === node.id).some(l => selectedWorks.has(l.source));
                } else {
                    if (node.type === 'person') isVisible = selectedPeople.has(node.id);
                    else isVisible = graphData.links.filter(l => l.source === node.id).some(l => selectedPeople.has(l.target));
                }
                return { id: node.id, hidden: !isVisible };
            });
            nodeDataSet.update(updates);
        }

        document.getElementById('searchInput').addEventListener('input', renderList);
        window.onload = init;
    </script>
</body>
</html>
