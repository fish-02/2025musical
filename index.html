<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025 音樂劇互動網絡系統 v6</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent-work: #38bdf8;
            --accent-person: #4ade80;
            --accent-error: #fb7185;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100%; width: 100%; }
        
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            #sidebar { width: 100% !important; height: 45% !important; border-right: none !important; border-bottom: 1px solid #334155; }
            #mynetwork { height: 55% !important; }
        }

        #sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid #334155; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        #mynetwork { flex-grow: 1; height: 100%; position: relative; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }

        /* 統計數據總覽 */
        .sidebar-header { padding: 15px 20px; background: #161e2d; border-bottom: 1px solid #334155; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .stat-card { background: var(--bg-color); padding: 8px 5px; border-radius: 6px; text-align: center; border: 1px solid #334155; }
        .stat-num { display: block; font-size: 1.1rem; font-weight: bold; color: var(--accent-work); }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }

        .tabs { display: flex; background: #0f172a; cursor: pointer; }
        .tab { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 0.85rem; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent-work); background: #1e293b; }

        .toolbar { padding: 10px 20px; background: var(--sidebar-bg); border-bottom: 1px solid #334155; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
        button { flex: 1; padding: 8px; background: #334155; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        button:hover { background: #475569; }
        
        .filter-section { flex: 1; overflow-y: auto; padding: 10px 20px; scrollbar-width: thin; scrollbar-color: #475569 transparent; }
        .search-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; margin-bottom: 10px; outline: none; }

        /* 修正閃爍：預設隱藏直到網路圖準備好 */
        .zoom-controls { 
            position: absolute; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 500; 
            opacity: 0; transition: opacity 0.5s ease-in-out; pointer-events: none; 
        }
        .zoom-controls.ready { opacity: 1; pointer-events: auto; }

        .zoom-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(56, 189, 248, 0.8); color: white; border: none; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .zoom-btn:active { transform: scale(0.9); }

        .check-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .count-tag { font-size: 0.7rem; color: var(--text-dim); background: #0f172a; padding: 2px 6px; border-radius: 10px; }
        
        #loading-overlay { position: absolute; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-work); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="letter-spacing: 2px; font-size: 0.9rem;">系統初始化中...</div>
    </div>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2 style="margin:0; font-size:1rem; color: var(--accent-work);">數據總覽</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-num" id="stat-works">0</span>
                        <span class="stat-label">劇目</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="stat-people">0</span>
                        <span class="stat-label">人物</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="stat-edges">0</span>
                        <span class="stat-label">關聯</span>
                    </div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-work" onclick="switchTab('work')">依劇目篩選</div>
                <div class="tab" id="tab-person" onclick="switchTab('person')">依人物篩選</div>
            </div>

            <div class="toolbar">
                <select id="sortOrder" style="width:100%; padding:8px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid #475569; border-radius:4px;" onchange="renderList()">
                    <option value="countDesc">排序：關聯數 (多 → 少)</option>
                    <option value="name">排序：名稱 (A-Z)</option>
                </select>
                <div class="btn-group">
                    <button onclick="selectAll(true)">全選顯示</button>
                    <button onclick="selectAll(false)">全部隱藏</button>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="快速搜尋...">
            </div>
            
            <div id="filterList" class="filter-section"></div>
        </div>

        <div id="mynetwork">
            <div id="zoomControls" class="zoom-controls">
                <button class="zoom-btn" onclick="zoom(1.2)" title="放大">+</button>
                <button class="zoom-btn" onclick="zoom(0.8)" title="縮小">−</button>
                <button class="zoom-btn" onclick="resetZoom()" title="重設視角" style="font-size:0.75rem;">RESET</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let network = null;
        let nodeDataSet = new vis.DataSet();
        let edgeDataSet = new vis.DataSet();
        let currentTab = 'work';
        let selectedWorks = new Set();
        let selectedPeople = new Set();
        let nodeCounts = {};

        function init() {
            // 1. 初始化統計與狀態
            graphData.nodes.forEach(n => {
                nodeCounts[n.id] = graphData.links.filter(l => l.source === n.id || l.target === n.id).length;
                if(n.type === 'work') selectedWorks.add(n.id);
                else selectedPeople.add(n.id);
            });
            
            document.getElementById('stat-works').innerText = graphData.nodes.filter(n => n.type === 'work').length;
            document.getElementById('stat-people').innerText = graphData.nodes.filter(n => n.type === 'person').length;
            document.getElementById('stat-edges').innerText = graphData.links.length;

            // 2. 建立資料集
            nodeDataSet.add(graphData.nodes.map(n => ({
                id: n.id, label: n.id, title: n.id,
                shape: n.type === 'work' ? 'diamond' : 'dot',
                color: { background: n.type === 'work' ? '#38bdf8' : '#4ade80', border: '#ffffff' },
                font: { color: '#ffffff', size: 14 },
                size: n.type === 'work' ? 25 : 15
            })));

            edgeDataSet.add(graphData.links.map(l => ({
                from: l.source, to: l.target, label: l.role,
                font: { size: 10, color: '#94a3b8' },
                color: { color: '#334155' }, arrows: 'to'
            })));

            // 3. 繪製圖表
            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes: nodeDataSet, edges: edgeDataSet }, {
                physics: { 
                    solver: 'forceAtlas2Based', 
                    forceAtlas2Based: { gravitationalConstant: -120, springLength: 160 },
                    stabilization: { iterations: 150 }
                },
                interaction: { hover: true, tooltipDelay: 200 }
            });

            // 4. 解決閃爍邏輯：穩定後顯示 UI
            network.once("stabilizationIterationsDone", function () {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('zoomControls').classList.add('ready');
                }, 500);
                network.setOptions({ physics: { enabled: false } });
            });

            renderList();
            updateVisibility();
        }

        function zoom(s) { network.moveTo({ scale: network.getScale() * s }); }
        function resetZoom() { network.fit({ animation: true }); }

        function switchTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            renderList();
        }

        function renderList() {
            const container = document.getElementById('filterList');
            container.innerHTML = '';
            const term = document.getElementById('searchInput').value.toLowerCase();
            const sortVal = document.getElementById('sortOrder').value;
            
            let list = graphData.nodes.filter(n => n.type === currentTab && n.id.toLowerCase().includes(term));
            list.sort((a, b) => sortVal === 'countDesc' ? nodeCounts[b.id] - nodeCounts[a.id] : a.id.localeCompare(b.id, 'zh-Hant'));

            list.forEach(node => {
                const isChecked = currentTab === 'work' ? selectedWorks.has(node.id) : selectedPeople.has(node.id);
                const item = document.createElement('div');
                item.className = 'check-item';
                item.innerHTML = `
                    <label style="display:flex; align-items:center; flex:1; cursor:pointer;">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="margin-right:10px;">
                        <span style="color: ${isChecked ? 'white' : 'var(--text-dim)'}">${node.id}</span>
                    </label>
                    <span class="count-tag">${nodeCounts[node.id]}</span>
                `;
                item.querySelector('input').addEventListener('change', (e) => {
                    if (currentTab === 'work') { e.target.checked ? selectedWorks.add(node.id) : selectedWorks.delete(node.id); }
                    else { e.target.checked ? selectedPeople.add(node.id) : selectedPeople.delete(node.id); }
                    updateVisibility();
                    renderList(); // 更新文字顏色
                });
                container.appendChild(item);
            });
        }

        function updateVisibility() {
            network.setOptions({ physics: { enabled: true, stabilization: { iterations: 20 } } });
            const nodesToUpdate = graphData.nodes.map(node => {
                let isVisible = false;
                if (currentTab === 'work') {
                    if (node.type === 'work') isVisible = selectedWorks.has(node.id);
                    else isVisible = graphData.links.filter(l => l.target === node.id).some(l => selectedWorks.has(l.source));
                } else {
                    if (node.type === 'person') isVisible = selectedPeople.has(node.id);
                    else isVisible = graphData.links.filter(l => l.source === node.id).some(l => selectedPeople.has(l.target));
                }
                return { id: node.id, hidden: !isVisible };
            });
            nodeDataSet.update(nodesToUpdate);
        }

        function selectAll(bool) {
            const term = document.getElementById('searchInput').value.toLowerCase();
            graphData.nodes.filter(n => n.type === currentTab && n.id.toLowerCase().includes(term)).forEach(n => {
                if (currentTab === 'work') bool ? selectedWorks.add(n.id) : selectedWorks.delete(n.id);
                else bool ? selectedPeople.add(n.id) : selectedPeople.delete(n.id);
            });
            renderList(); updateVisibility();
        }

        document.getElementById('searchInput').addEventListener('input', renderList);
        window.onload = init;
    </script>
</body>
</html>
