<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025 音樂劇互動網絡系統 v4</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent-work: #38bdf8;
            --accent-person: #4ade80;
        }
        
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow: hidden; }

        /* 響應式佈局架構 */
        .app-container { display: flex; height: 100%; width: 100%; flex-direction: row; }
        
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            #sidebar { width: 100% !important; height: 40% !important; border-right: none !important; border-bottom: 1px solid #334155; }
            #mynetwork { height: 60% !important; }
        }

        #sidebar { width: 380px; background: var(--sidebar-bg); border-right: 1px solid #334155; display: flex; flex-direction: column; z-index: 1000; flex-shrink: 0; }
        #mynetwork { flex-grow: 1; height: 100%; position: relative; }

        .sidebar-header { padding: 15px 20px; }
        .tabs { display: flex; background: #0f172a; cursor: pointer; }
        .tab { flex: 1; padding: 12px; text-align: center; color: var(--text-dim); font-size: 0.85rem; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--text-main); border-bottom: 2px solid var(--accent-work); background: #1e293b; }

        .toolbar { padding: 10px 20px; background: var(--sidebar-bg); }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
        button { flex: 1; padding: 8px; background: #334155; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        .filter-section { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .search-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: white; margin-bottom: 10px; }

        /* 圖表操作按鈕 (Zoom Controls) */
        .zoom-controls {
            position: absolute;
            right: 20px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 500;
        }
        .zoom-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.9);
            color: white;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:active { transform: scale(0.9); }

        .check-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .count-tag { font-size: 0.7rem; color: var(--text-dim); background: #0f172a; padding: 2px 6px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <h2 style="margin:0; font-size:1rem;">音樂劇數據中心</h2>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-work" onclick="switchTab('work')">劇目清單</div>
                <div class="tab" id="tab-person" onclick="switchTab('person')">人物清單</div>
            </div>

            <div class="toolbar">
                <select id="sortOrder" style="width:100%; padding:8px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid #475569;" onchange="renderList()">
                    <option value="countDesc">依關聯數量 (多 → 少)</option>
                    <option value="name">依名稱排序 (A-Z)</option>
                </select>
                <div class="btn-group">
                    <button onclick="selectAll(true)">全選</button>
                    <button onclick="selectAll(false)">全不選</button>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="搜尋關鍵字...">
            </div>
            
            <div id="filterList" class="filter-section"></div>
        </div>

        <div id="mynetwork">
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoom(1.2)" title="放大">+</button>
                <button class="zoom-btn" onclick="zoom(0.8)" title="縮小">−</button>
                <button class="zoom-btn" onclick="resetZoom()" title="回到預設檢視" style="font-size:0.8rem;">RE</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let network = null;
        let nodeDataSet = new vis.DataSet();
        let edgeDataSet = new vis.DataSet();
        let currentTab = 'work';
        let selectedWorks = new Set();
        let selectedPeople = new Set();
        let nodeCounts = {};

        function init() {
            graphData.nodes.forEach(n => {
                nodeCounts[n.id] = graphData.links.filter(l => l.source === n.id || l.target === n.id).length;
                if(n.type === 'work') selectedWorks.add(n.id);
                else selectedPeople.add(n.id);
            });

            nodeDataSet.add(graphData.nodes.map(n => ({
                id: n.id, label: n.id, title: n.id,
                shape: n.type === 'work' ? 'diamond' : 'dot',
                color: { background: n.type === 'work' ? '#38bdf8' : '#4ade80', border: '#ffffff' },
                font: { color: '#ffffff', size: 14 },
                size: n.type === 'work' ? 25 : 15
            })));

            edgeDataSet.add(graphData.links.map(l => ({
                from: l.source, to: l.target, label: l.role,
                font: { size: 10, color: '#ffffff', strokeWidth: 0 },
                color: { color: '#475569' }, arrows: 'to'
            })));

            const container = document.getElementById('mynetwork');
            network = new vis.Network(container, { nodes: nodeDataSet, edges: edgeDataSet }, {
                physics: { solver: 'forceAtlas2Based', forceAtlas2Based: { gravitationalConstant: -100 } },
                interaction: { hover: true, tooltipDelay: 100, zoomView: true, dragView: true }
            });

            renderList();
            updateVisibility();
        }

        // 縮放功能邏輯
        function zoom(scaleFactor) {
            network.moveTo({ scale: network.getScale() * scaleFactor });
        }

        function resetZoom() {
            network.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
        }

        function switchTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            renderList();
        }

        function renderList() {
            const container = document.getElementById('filterList');
            container.innerHTML = '';
            const term = document.getElementById('searchInput').value.toLowerCase();
            const sortVal = document.getElementById('sortOrder').value;
            
            let list = graphData.nodes.filter(n => n.type === currentTab && n.id.toLowerCase().includes(term));
            
            list.sort((a, b) => {
                if (sortVal === 'countDesc') return nodeCounts[b.id] - nodeCounts[a.id];
                return a.id.localeCompare(b.id, 'zh-Hant');
            });

            list.forEach(node => {
                const isChecked = currentTab === 'work' ? selectedWorks.has(node.id) : selectedPeople.has(node.id);
                const item = document.createElement('div');
                item.className = 'check-item';
                item.innerHTML = `
                    <label style="display:flex; align-items:center; flex:1; cursor:pointer;">
                        <input type="checkbox" ${isChecked ? 'checked' : ''} style="margin-right:10px;">
                        <span>${node.id}</span>
                    </label>
                    <span class="count-tag">${nodeCounts[node.id]}</span>
                `;
                item.querySelector('input').addEventListener('change', (e) => {
                    if (currentTab === 'work') { e.target.checked ? selectedWorks.add(node.id) : selectedWorks.delete(node.id); }
                    else { e.target.checked ? selectedPeople.add(node.id) : selectedPeople.delete(node.id); }
                    updateVisibility();
                });
                container.appendChild(item);
            });
        }

        function updateVisibility() {
            const nodesToUpdate = [];
            graphData.nodes.forEach(node => {
                let isVisible = false;
                if (currentTab === 'work') {
                    if (node.type === 'work') isVisible = selectedWorks.has(node.id);
                    else isVisible = graphData.links.filter(l => l.target === node.id).some(l => selectedWorks.has(l.source));
                } else {
                    if (node.type === 'person') isVisible = selectedPeople.has(node.id);
                    else isVisible = graphData.links.filter(l => l.source === node.id).some(l => selectedPeople.has(l.target));
                }
                nodesToUpdate.push({ id: node.id, hidden: !isVisible });
            });
            nodeDataSet.update(nodesToUpdate);
        }

        function selectAll(bool) {
            const term = document.getElementById('searchInput').value.toLowerCase();
            graphData.nodes.filter(n => n.type === currentTab && n.id.toLowerCase().includes(term)).forEach(n => {
                if (currentTab === 'work') bool ? selectedWorks.add(n.id) : selectedWorks.delete(n.id);
                else bool ? selectedPeople.add(n.id) : selectedPeople.delete(n.id);
            });
            renderList(); updateVisibility();
        }

        document.getElementById('searchInput').addEventListener('input', renderList);
        window.onload = init;
    </script>
</body>
</html>
